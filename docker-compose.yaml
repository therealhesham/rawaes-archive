services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "32777:80"
    environment:
      # App
      APP_NAME: ${APP_NAME:-روائس}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${SERVICE_URL_APP:-${APP_URL}}
      APP_TIMEZONE: Asia/Riyadh
      APP_LOCALE: ar

      LOG_CHANNEL: stderr
      LOG_LEVEL: error

      # Database
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-rawaes}
      DB_USERNAME: ${MYSQL_USER:-rawaes}
      DB_PASSWORD: ${MYSQL_PASSWORD}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_CLIENT: phpredis

      # Cache / Session / Queue
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      SESSION_LIFETIME: 120
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      QUEUE_CONNECTION: redis

      # Storage
      FILESYSTEM_DISK: local
      # قرص ملفات الأرشيف: local أو spaces (DigitalOcean)
      ARCHIVE_DISK: ${ARCHIVE_DISK:-spaces}
      DO_SPACES_KEY: ${DO_SPACES_KEY}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-fra1}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET}
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT}

      # OCR
      OCR_SPACE_API_KEY: ${OCR_SPACE_API_KEY}

      # Notion
      NOTION_API_TOKEN: ${NOTION_API_TOKEN}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID}

      # Scanner watcher
      SCAN_API_TOKEN: ${SCAN_API_TOKEN}

      # Integration API (shared token)
      INTEGRATION_API_TOKEN: ${INTEGRATION_API_TOKEN}
      INTEGRATION_UPLOADER_USER_ID: ${INTEGRATION_UPLOADER_USER_ID}

      # Mail
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-روائس}

      BCRYPT_ROUNDS: 12
    volumes:
      - app-storage:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rawaes}
      MYSQL_USER: ${MYSQL_USER:-rawaes}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  app-storage:
  mysql-data:
  redis-data: